<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Who's Your Bias?</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="bg-floats"></div>
  <div id="app">

    <!-- Start screen -->
    <section id="start-screen" class="screen active">
      <div class="start-sides start-sides--left">
        <img src="images/rm-rs.png"     class="member-cutout" alt="RM">
        <img src="images/suga-rs.png"  class="member-cutout" alt="Suga">
        <img src="images/jimin-rs.png" class="member-cutout" alt="Jimin">
        <img src="images/v-rs.png"     class="member-cutout" alt="V">
      </div>

      <div class="card start-card">
        <h1>Who's Your Bias?</h1>
        <button id="start-btn" class="btn-primary">Start Quiz</button>
      </div>

      <div class="start-sides start-sides--right">
        <img src="images/jin-rs.png"    class="member-cutout" alt="Jin">
        <img src="images/jhope-rs.png"  class="member-cutout" alt="J-Hope">
        <img src="images/jk-rs.png"     class="member-cutout" alt="Jungkook">
      </div>
    </section>

    <!-- Quiz screen -->
    <section id="quiz-screen" class="screen">
      <div class="card">
        <div class="progress-bar">
          <div id="progress-fill"></div>
        </div>
        <div class="quiz-nav">
          <button id="back-btn" class="btn-back">← Back</button>
          <p id="question-counter" class="counter">Question 1 of 7</p>
        </div>
        <h2 id="question-text"></h2>
        <div id="answers" class="answers"></div>
      </div>
    </section>

    <!-- Result screen -->
    <section id="result-screen" class="screen">
      <div class="card result-card">
        <p class="result-label">Your BTS bias is...</p>
        <div id="result-member" class="member-avatar">
          <img id="result-gif" alt="" />
          <span id="result-emoji"></span>
        </div>
        <h2 id="result-name"></h2>
        <p id="result-desc"></p>
        <button id="retry-btn" class="btn-primary">Try Again</button>
      </div>
    </section>

  </div>
  <script src="quiz.js"></script>
</body>
</html>
