<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Find Your BTS Bias</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <!-- Start screen -->
    <section id="start-screen" class="screen active">
      <div class="card">
        <h1>Find Your BTS Bias</h1>
        <p class="subtitle">Answer 7 questions to discover which BTS member matches your vibe.</p>
        <button id="start-btn" class="btn-primary">Start Quiz</button>
      </div>
    </section>

    <!-- Quiz screen -->
    <section id="quiz-screen" class="screen">
      <div class="card">
        <div class="progress-bar">
          <div id="progress-fill"></div>
        </div>
        <p id="question-counter" class="counter">Question 1 of 7</p>
        <h2 id="question-text"></h2>
        <div id="answers" class="answers"></div>
      </div>
    </section>

    <!-- Result screen -->
    <section id="result-screen" class="screen">
      <div class="card result-card">
        <p class="result-label">Your BTS bias is...</p>
        <div id="result-member" class="member-avatar"></div>
        <h2 id="result-name"></h2>
        <p id="result-desc"></p>
        <button id="retry-btn" class="btn-primary">Try Again</button>
      </div>
    </section>
  </div>

  <script src="quiz.js"></script>
</body>
</html>
